/**:
    ros__parameters:
        image_transport: raw
        family: 36h11          # AprilTag family
        size: 0.04             # Default tag edge size in meters (adjust to your actual tag size!)
        max_hamming: 0         # Maximum allowed hamming distance

        detector:
            threads: 2
            decimate: 1.0      # No decimation for small tags (increase to 2.0 for speed)
            blur: 0.0
            refine: True
            sharpening: 0.25
            debug: False

        # Publish TF frames for each detected tag
        # Frame names will be "tag0", "tag1", etc. (matching AprilTagDetector code)

        # List the contest tags (IDs 0-5)
        # The 'frames' field controls the TF frame name published for each tag.
        tag:
            ids:    [0,    1,    2,    3,    4,    5]
            frames: [tag0, tag1, tag2, tag3, tag4, tag5]
            sizes:  [0.04, 0.04, 0.04, 0.04, 0.04, 0.04]
